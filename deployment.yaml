apiVersion: apps/v1
kind: Deployment

metadata:
  name: shopeasy-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: shopeasy

  template:
    metadata:
      labels:
        app: shopeasy

    spec:
      containers:
      - name: shopeasy

        image: us-central1-docker.pkg.dev/project-2f5b3e28-ac7e-4407-938/shopeasy-repo/shopeasy-app:v1

        ports:
        - containerPort: 8080
